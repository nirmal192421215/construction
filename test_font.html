<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Baumans&display=swap" rel="stylesheet">

<style>
/* FORCE FOOTER GRID MOBILE */
@media (max-width: 768px) {
  .footer-grid {
    grid-template-columns: 1fr 1fr !important;
    gap: 2rem 1rem !important;
  }
  .footer-grid > div:first-child {
    grid-column: 1 / -1 !important;
  }
}
</style>

<style>
/* FORCE 2-COLUMN PKG CARDS ON MOBILE */
@media (max-width: 768px) {
  .pkg-cards-wrapper { grid-template-columns: 1fr 1fr !important; gap: 0.75rem !important; }
  .glass-card { padding: 1.25rem 0.85rem !important; }
  .glass-card-title { font-size: 1.15rem !important; margin-bottom: 0.25rem !important; }
  .glass-card-price { font-size: 1.6rem !important; }
  .glass-card-unit { font-size: 0.65rem !important; }
  .pkg-desc-text { font-size: 0.7rem !important; line-height: 1.3 !important; margin: 0.5rem 0 1rem !important; }
  .pkg-included-label { font-size: 0.55rem !important; margin-bottom: 0.75rem !important; }
  .glass-feature { font-size: 0.7rem !important; gap: 0.4rem !important; margin-bottom: 0.5rem !important; line-height: 1.2 !important; }
  .glass-feature-dot { width: 4px !important; height: 4px !important; margin-top: 4px !important; }
  .btn-glass { padding: 0.6rem !important; font-size: 0.75rem !important; margin-top: 1rem !important; }
  .pkg-top-banner { font-size: 0.5rem !important; padding: 0.2rem 0.5rem !important; }
  .pkg-tier-label { font-size: 0.55rem !important; margin-bottom: 0.25rem !important; }
}
</style>
</head>
<body>
<svg width="400" height="200">
<text x="50" y="100" font-family="'Baumans', 'Bauhaus 93', sans-serif" font-size="95px">BIND</text>
</svg>
</body>
</html>
